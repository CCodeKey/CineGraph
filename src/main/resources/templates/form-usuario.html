<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CineGraph - Novo Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; color: #0f172a; font-size: 1.2rem; }
        .card-form { background: #ffffff; border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); max-width: 650px; margin: 60px auto; padding: 3rem; }
        .form-control { padding: 12px; font-size: 1.2rem; border: 2px solid #cbd5e1; border-radius: 8px; }
        .form-control:focus { border-color: #1e3a8a; box-shadow: none; }
        .form-label { font-weight: 700; color: #334155; }
    </style>
</head>
<body>

<div class="card card-form">
    <h2 class="fw-bold mb-4 text-primary text-center">👤 Cadastro de Usuário</h2>
    <hr class="mb-4 text-muted">

    <form th:action="@{/web/usuarios/salvar}" th:object="${usuario}" method="post">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome Completo</label>
            <input type="text" th:field="*{nome}" id="nome" class="form-control" placeholder="Ex: Gabriel de Freitas" required>
        </div>

        <div class="mb-3">
            <label for="idade" class="form-label">Idade</label>
            <input type="number" th:field="*{idade}" id="idade" class="form-control" min="0" placeholder="Ex: 21" required>
        </div>

        <div class="mb-4">
            <label for="email" class="form-label">Endereço de E-mail</label>
            <input type="email" th:field="*{email}" id="email" class="form-control" placeholder="Ex: email@provedor.com" required>
        </div>

        <div class="d-grid gap-2 mt-5">
            <button type="submit" class="btn btn-primary btn-lg fw-bold py-3">Cadastrar Usuário</button>
            <a th:href="@{/web/painel}" class="btn btn-outline-secondary btn-lg fw-bold py-2 mt-2">Voltar ao Painel</a>
        </div>
    </form>
</div>

</body>
</html>
