<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CineGraph - Novo Filme</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; color: #0f172a; font-size: 1.2rem; }
        .card-form { background: #ffffff; border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); max-width: 650px; margin: 60px auto; padding: 3rem; }
        .form-control { padding: 12px; font-size: 1.2rem; border: 2px solid #cbd5e1; border-radius: 8px; }
        .form-control:focus { border-color: #1e3a8a; box-shadow: none; }
        .form-label { font-weight: 700; color: #334155; }
    </style>
</head>
<body>

<div class="card card-form">
    <h2 class="fw-bold mb-4 text-primary text-center">🎥 Novo Filme</h2>
    <hr class="mb-4 text-muted">

    <form th:action="@{/web/filmes/salvar}" th:object="${filme}" method="post">
        <div class="mb-3">
            <label for="titulo" class="form-label">Título do Filme</label>
            <input type="text" th:field="*{titulo}" id="titulo" class="form-control" placeholder="Ex: Interstellar" required>
        </div>

        <div class="mb-3">
            <label for="genero" class="form-label">Gênero</label>
            <input type="text" th:field="*{genero}" id="genero" class="form-control" placeholder="Ex: Ficção Científica" required>
        </div>

        <div class="mb-4">
            <label for="ano" class="form-label">Ano de Lançamento</label>
            <input type="number" th:field="*{ano}" id="ano" class="form-control" min="1888" max="2030" placeholder="Ex: 2014" required>
        </div>

        <div class="d-grid gap-2 mt-5">
            <button type="submit" class="btn btn-primary btn-lg fw-bold py-3">Salvar no ArangoDB</button>
            <a th:href="@{/web/painel}" class="btn btn-outline-secondary btn-lg fw-bold py-2 mt-2">Voltar ao Painel</a>
        </div>
    </form>
</div>

</body>
</html>
