<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CineGraph - Nova Avaliação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; color: #0f172a; font-size: 1.2rem; }
        .card-form { background: #ffffff; border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); max-width: 650px; margin: 60px auto; padding: 3rem; }
        .form-control, .form-select { padding: 12px; font-size: 1.2rem; border: 2px solid #cbd5e1; border-radius: 8px; }
        .form-control:focus, .form-select:focus { border-color: #1e3a8a; box-shadow: none; }
        .form-label { font-weight: 700; color: #334155; }
    </style>
</head>
<body>

<div class="card card-form">
    <h2 class="fw-bold mb-4 text-primary text-center">⭐ Criar Avaliação (Aresta)</h2>
    <hr class="mb-4 text-muted">

    <form th:action="@{/web/avaliacoes/salvar}" th:object="${avaliacao}" method="post">

        <div class="mb-3">
            <label for="usuarioId" class="form-label">Quem está avaliando? (Origem)</label>
            <select th:field="*{usuarioId}" id="usuarioId" class="form-select" required>
                <option value="" disabled selected>Escolha o usuário...</option>
                <option th:each="u : ${todosUsuarios}" th:value="${u.id}" th:text="${u.nome}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="filmeId" class="form-label">Qual o filme selecionado? (Destino)</label>
            <select th:field="*{filmeId}" id="filmeId" class="form-select" required>
                <option value="" disabled selected>Escolha o filme...</option>
                <option th:each="f : ${todosFilmes}" th:value="${f.id}" th:text="${f.titulo}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="nota" class="form-label">Nota da Crítica (1 a 10)</label>
            <input type="number" th:field="*{nota}" id="nota" class="form-control" min="1" max="10" placeholder="Ex: 10" required>
        </div>

        <div class="mb-4">
            <label for="comentario" class="form-label">Comentário / Opinião</label>
            <textarea th:field="*{comentario}" id="comentario" class="form-control" rows="3" placeholder="Insira o texto da crítica..." required></textarea>
        </div>

        <div class="d-grid gap-2 mt-5">
            <button type="submit" class="btn btn-primary btn-lg fw-bold py-3">Registrar Avaliação</button>
            <a th:href="@{/web/painel}" class="btn btn-outline-secondary btn-lg fw-bold py-2 mt-2">Voltar ao Painel</a>
        </div>
    </form>
</div>

</body>
</html>
